[colors]
background     = #1a1d15
statusline     = #b8ad94
separator      = #3c4032
focused-bg     = #2f3327
focused-fg     = #d0c6aa
focused-ul     = #7f8f5a
inactive-fg    = #7f7867
urgent-bg      = #3a241d
urgent-fg      = #c8b9a0
urgent-ul      = #8f5d4f
good           = #9aac6f
bad            = #b57766
degraded       = #c0a268

[bar/main]
width         = 100%
height        = 20pt
radius        = 0
position      = bottom
bottom = true
monitor = ${env:MONITOR:}

background    = ${colors.background}
foreground    = ${colors.statusline}

border-size   = 0
padding-left  = 0
padding-right = 1
module-margin = 1

separator            = |
separator-foreground = ${colors.separator}

font-0 = monospace:size=9;2
font-1 = Iosevka Nerd Font:size=11;2

modules-left  = archmenu workspaces xwindow
modules-right = battery disk load memory date

tray-position = ${env:TRAY_POS:none}
tray-padding  = 4

wm-restack  = i3
enable-ipc  = true

[module/archmenu]
type = custom/text

content        = " "
content-font   = 2
content-foreground = ${colors.good}

click-left = rofi -show drun

[module/workspaces]
type = custom/script
exec = ~/.config/polybar/workspaces.sh
tail = true

[module/i3]
type = internal/i3

pin-workspaces  = true
show-urgent     = true
strip-wsnumbers = false
index-sort      = true
enable-click    = true

format = <label-state>

label-focused            = %index%
label-focused-padding    = 1
label-focused-foreground = ${colors.focused-fg}
label-focused-background = ${colors.focused-bg}
label-focused-underline  = ${colors.focused-ul}

label-unfocused            = %index%
label-unfocused-padding    = 1
label-unfocused-foreground = ${colors.inactive-fg}
label-unfocused-background = ${colors.background}

label-visible            = %index%
label-visible-padding    = 1
label-visible-foreground = ${colors.statusline}
label-visible-background = ${colors.background}

label-urgent            = %index%
label-urgent-padding    = 1
label-urgent-foreground = ${colors.urgent-fg}
label-urgent-background = ${colors.urgent-bg}
label-urgent-underline  = ${colors.urgent-ul}

[module/xwindow]
type  = internal/xwindow
label = %title:0:30:...%
label-foreground = ${colors.statusline}

[module/battery]
type          = internal/battery
battery       = BAT0
adapter       = AC
full-at       = 98
poll-interval = 5

format-charging    = <label-charging>
format-discharging = <label-discharging>
format-full        = <label-full>

label-charging             = [BAT] %percentage%%
label-charging-foreground  = ${colors.good}
label-discharging             = [BAT] %percentage%%
label-discharging-foreground  = ${colors.statusline}
label-full             = [BAT] 100%
label-full-foreground  = ${colors.good}

[module/disk]
type      = internal/fs
mount-0   = /
interval  = 10

label-mounted            = [SSD] %free%/%total%
label-mounted-foreground = ${colors.statusline}
label-unmounted          = [SSD] N/A

[module/load]
type     = internal/cpu
interval = 1

format-prefix            = "[CPU] "
format-prefix-foreground = ${colors.statusline}
label                    = %percentage%%
label-foreground         = ${colors.statusline}

[module/memory]
type     = internal/memory
interval = 1

format-prefix            = "[MEM] "
format-prefix-foreground = ${colors.statusline}
label                    = %gb_used%/%gb_total%
label-foreground         = ${colors.statusline}

[module/date]
type     = internal/date
interval = 1
date     = %Y-%m-%d %H:%M:%S
label    = %date%
label-foreground = ${colors.statusline}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
