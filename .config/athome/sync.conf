# ~/.config/athome/sync.conf -- paths tracked by athome
#
# Format:
#   - one path per line
#   - relative paths are resolved against $HOME
#       e.g. ".config/fish"  ->  $HOME/.config/fish
#   - paths starting with "/" are absolute, used as-is
#       e.g. "/etc/foo.conf" ->  /etc/foo.conf
#   - files and directories are both fine, directories are synced
#     recursively, file by file
#   - "#" starts a comment, blank lines are ignored
#
# Each entry is mirrored into this repo at the same relative path
# (absolute, outside-$HOME entries are mirrored without their
# leading "/", e.g. /etc/foo.conf -> repo/etc/foo.conf).

# shell
.config/fish
.config/bash
.fehbg
.Xresources
.xinitrc

# terminals
.config/kitty
.config/ghostty

# editor
.config/micro

# ssh
.ssh/config

# personal scripts / cron / pacman hooks
.pacman
.cron

# desktop / wm
.config/hypr
.config/i3
.config/polybar
.config/dunst
.config/illogical-impulse
.config/quickshell
.config/fuzzel
.config/xdg-desktop-portal/hyprland-portals.conf
.config/athome

# theming
.local/share/icons/macOS-hypr
.config/matugen
.config/kde-material-you-colors
.local/state/quickshell/user/generated/terminal/kitty-theme.conf
.local/state/quickshell/user/generated/wallpaper
.local/state/quickshell/user/generated/color.txt
.local/state/quickshell/user/generated/colors.json
.local/state/quickshell/user/generated/material_colors.scss

# misc app config
